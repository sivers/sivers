<article>
<header>
<figure><img src="/images/book/{{code}}.webp" alt="{{title}} - by {{author}}"></figure>
<h1>{{title}} - by {{author}}</h1>
<dl>
	<dt>how strongly I recommend it:</dt>
	<dd>{{rating}}/10</dd>
	<dt>ISBN:</dt>
	<dd>{{isbn}}</dd>
	<dt>date read:</dt>
	<dd><time datetime="{{read}}">{{read}}</time></dd>
</dl>
<p>See <a href="/book">my list of 460+ books</a>, for more.</p>
<div id="summary">
{{summary}}
</div>
</header>
<section id="notes">
{{{notes}}}
</section>
</article>
