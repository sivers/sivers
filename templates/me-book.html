<article>
<header>
<figure><img src="/images/book/{{code}}.webp" alt="{{title}} - by {{author}}"></figure>
<h1>{{title}} - by {{author}}</h1>
<dl>
	<dt>how strongly I recommend it:</dt>
	<dd><strong>{{rating}}</strong>/10</dd>
	<dt>ISBN:</dt>
	<dd>{{isbn}}</dd>
	<dt>date read:</dt>
	<dd><time datetime="{{read}}">{{read}}</time></dd>
</dl>
<p>See <a href="/book">many more books</a> too.</p>
<div id="summary">
{{summary}}
</div>
</header>
<section id="notes">
{{{notes}}}
</section>
</article>
