<article>
<header>
{{#tag}}
<p>From <a href="/{{tag}}">my {{tag}} blog</a>:</p>
{{/tag}}
{{#book_uri}}
<p>From the book “<a href="/{{book_uri}}">{{book_name}}</a>”:</p>
{{/book_uri}}
<h1>{{title}}</h1>
<time datetime="{{posted}}">{{posted}}</time>
{{#mp3}}
<audio src="{{mp3}}" preload="none" controls></audio>
{{/mp3}}
</header>
{{{body}}}
<footer>
<p>© <a href="/">Derek Sivers</a></p>
<p><strong>Copy &amp; share</strong>: <a href="/{{uri}}">sive.rs/{{uri}}</a></p>
{{#mp4}}
<video src="{{mp4}}" preload="none" controls></audio>
{{/mp4}}
</footer>
</article>
<section id="comments"></section>
<script src="/js/c.js"></script>
